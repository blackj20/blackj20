    <main>
        <div class="formilaire"> 

    
             
             <form id="img" enctype="multipart/form-data" > 

                <h3>uploads image</h3>
                 
                 <div class="enter">
                     <input type="file"  required="identifen" name="image">
                 </div>
                 <div class="enter">
                     <input type="text"  required="identifen"  name="description">
                     <label form="description">description</label>
                 </div>
                 
                 
                 <input type="submit" value="uploads" class="ok" id="ok" data-btn="login" >
                 
             </form> 
        
            <form id="realisation">
                <h3>uploads realisation</h3>
                <div class="enter">
                    <input type="text" name="anneé" required>
                    <label form="anneé">anneé</label>
                </div>
                <div class="enter">
                     <input type="text" name="localisation" required>
                    <label form="localisation">localisation</label>
                </div>
                <div class="enter">
                    <input type="text" name="titre" required>

                </div>

                    <input type="text" name="description" required>
                    <label form="description">description</label>
                </div>
                 <div class="enter">
                    <input type="text" name="image" required>
                    <label form="image">image</label>
                </div>
                  <button type="submit" class="ok">Upload</button>                       
            </form> 
        
            <form id="actualite">
                <h3>uploads actualités</h3>
                 <div class="enter">
                    <input type="text" name="titre" required>
                    <label form="titre">titre</label>
                </div>
                 <div class="enter">
                    <input type="text" name="description" required>
                    <label form="description">description</label>  
                </div>
                 <div class="enter">
                    <input type="text" name="description" required>
                    <label form="description">description</label>   
                </div>
                 <div class="enter">
                   <input type="text" name="image" required>
                   <label form="image">image</label>   
                </div>
                <button type="submit" class="ok">Upload</button>  
                 
            </form>
    
            <form id="annonce">
                <h3>uploads annonce</h3>
                 <div class="enter">
                    <input type="text" name="titre" required>
                    <label form="titre">titre</label>
                </div>
                 <div class="enter">
                    <input type="text" name="message" required>
                    <label form="message">message</label>
                </div>
                <button type="submit" class="ok" >Upload</button>
            </form> 
        </div>
