<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion admin | EMC</title>
</head>
<style>
    body{
    margin:0;
    font-family:'Poppins','Segoe UI',system-ui,sans-serif;
    background: radial-gradient(circle at 15% 20%, rgba(44,177,255,0.12), transparent 32%), #0b0b0d;
    color:#f6f6f6;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    }
    .login-card{
        background: rgba(255,255,255,0.04);
        border:1px solid rgba(255,255,255,0.08);
        padding:28px 24px;
        border-radius:16px;
        width:min(420px, 90vw);
        box-shadow:0 18px 40px rgba(0,0,0,0.35);
    }
    .login-card h1{
        margin:0 0 4px;
        font-size:24px;
    }
    .login-card p{
        margin:0 0 18px;
        color:#cfd3d8;
    }
    .field{
        display:flex;
        flex-direction:column;
        gap:6px;
        margin-bottom:14px;
    }
    .field label{
        font-size:14px;
        color:#d8dbe0;
    }
    .field input{
        height:44px;
        border-radius:10px;
        border:1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.05);
        padding:0 12px;
        color:#fff;
        outline:none;
    }
    .field input:focus{
        border-color:#2cb1ff;
        box-shadow:0 0 0 3px rgba(44,177,255,0.2);
    }
    .actions{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
    }
    .btn-primary{
        flex:1;
        height:44px;
        border-radius:10px;
        border:none;
        background: linear-gradient(120deg, #ffd70f, #ff9a1f);
        color:#1c1403;
        font-weight:700;
        cursor:pointer;
        box-shadow:0 12px 26px rgba(255,154,31,0.3);
    }
    .feedback{
        margin-top:12px;
        font-size:14px;
        min-height:20px;
    }
    .feedback.error{color:#ff9ea6;}
    .feedback.success{color:#9bffb4;}
    
</style>
<body>
    <section class="login-card">
        <h1>Connexion admin</h1>
        <p>Accédez au tableau de bord EMC pour gérer vos contenus.</p>
        <form id="admin-login" method="dialog">
            <div class="field">
                <label for="identifian">Identifiant</label>
                <input type="text" id="identifian" name="username" placeholder=" Id d'admin" required>
            </div>
            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="hash" placeholder="••••••••" required>
            </div>
            <div class="actions">
                <button type="submit" class="btn-primary">Se connecter</button>
            </div>
            <div id="login-feedback" class="feedback"></div>
        </form>
    </section>
    <script src="js/login.js"></script>
</body>
</html>
